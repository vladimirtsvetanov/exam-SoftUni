<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poll System | Login</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <main class="container py-5">
      <div class="auth-card card shadow-sm border-0 mx-auto p-4 p-md-5">
        <h1 class="h3 mb-4">Login</h1>
        <form id="login-form" novalidate>
          <div class="mb-3">
            <label class="form-label" for="login-email">Email</label>
            <input class="form-control" id="login-email" type="email" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="login-password">Password</label>
            <input class="form-control" id="login-password" type="password" required minlength="6" />
          </div>
          <button class="btn btn-primary w-100" type="submit">Login</button>
        </form>
      </div>
    </main>
    <script type="module" src="/src/js/pages/login.js"></script>
  </body>
</html>
