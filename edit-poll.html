<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poll System | Edit Poll</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <main class="container py-5">
      <section class="card shadow-sm border-0 p-4 p-md-5">
        <h1 class="h3 mb-4">Edit Poll</h1>
        <form id="edit-poll-form" novalidate>
          <div class="mb-3">
            <label class="form-label" for="edit-poll-title">Title</label>
            <input class="form-control" id="edit-poll-title" type="text" required minlength="3" />
          </div>
          <button class="btn btn-primary" type="submit">Update Poll</button>
        </form>
      </section>
    </main>
    <script type="module" src="/src/js/pages/edit-poll.js"></script>
  </body>
</html>
