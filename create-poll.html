<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poll System | Create Poll</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <main class="container py-5">
      <section class="card shadow-sm border-0 p-4 p-md-5">
        <h1 class="h3 mb-4">Create Poll</h1>
        <div id="poll-form-message" class="alert d-none" role="alert"></div>
        <form id="poll-form" novalidate>
          <div class="mb-3">
            <label class="form-label" for="poll-title">Title</label>
            <input class="form-control" id="poll-title" type="text" required minlength="3" />
          </div>
          <div class="mb-3">
            <label class="form-label" for="poll-description">Description</label>
            <textarea class="form-control" id="poll-description" rows="4" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label" for="poll-option-1">Option 1</label>
            <input class="form-control" id="poll-option-1" type="text" required minlength="1" />
          </div>
          <div class="mb-3">
            <label class="form-label" for="poll-option-2">Option 2</label>
            <input class="form-control" id="poll-option-2" type="text" required minlength="1" />
          </div>
          <div class="mb-3 form-check">
            <input class="form-check-input" id="poll-public" type="checkbox" checked />
            <label class="form-check-label" for="poll-public">Make this poll public</label>
          </div>
          <button class="btn btn-primary" type="submit">Save Poll</button>
        </form>
      </section>
    </main>
    <script type="module" src="/src/js/pages/create-poll.js"></script>
  </body>
</html>
