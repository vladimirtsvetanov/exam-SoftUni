<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poll System | Admin Panel</title>
    <!-- Vite uses this stylesheet path. Ensure it matches your working pages! -->
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <!-- Main container matching your index.html layout -->
    <main class="container py-5">
      <section class="card shadow-sm border-0 p-4 p-md-5">
        <h1 class="h3 mb-4">Admin Panel</h1>
        <p class="text-secondary mb-4">User and poll management interface.</p>

        <div id="admin-message" class="alert d-none" role="alert"></div>

        <!-- This wrapper holds the administrative stats and tables -->
        <div id="admin-content" class="mt-4">
          
          <!-- Simple Row for Stats -->
          <div class="row g-3 mb-4">
            <div class="col-sm-6">
              <div class="p-3 bg-light rounded border">
                <span class="text-secondary d-block small text-uppercase">Total Polls</span>
                <strong class="fs-4" id="total-polls-count">0</strong>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="p-3 bg-light rounded border">
                <span class="text-secondary d-block small text-uppercase">Active Users</span>
                <strong class="fs-4" id="total-users-count">0</strong>
              </div>
            </div>
          </div>

          <!-- Polls List -->
          <h2 class="h5 mb-3">Manage Polls</h2>
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Created By</th>
                  <th>Status</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="admin-polls-table-body">
                <tr>
                  <td colspan="4" class="text-center text-muted py-3">Loading polls...</td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </section>
    </main>
    <script type="module" src="/src/js/pages/admin.js"></script>
  </body>
</html>
